name: Deploy File Explorer to GitHub Pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download firmware_ok.md from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p explorer/data
          RELEASE_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$RELEASE_TAG" ]; then
            echo "Downloading firmware_ok.md from release: $RELEASE_TAG"
            gh release download "$RELEASE_TAG" --pattern "firmware_ok.md" --dir explorer/data/ || true
          fi

      - name: Build file data
        run: |
          if [ -f explorer/data/firmware_ok.md ]; then
            echo "Using firmware_ok.md from release"
            node scripts/build-data.js --test
          else
            echo "Building from download_urls.md"
            node scripts/build-data.js --test
          fi

      - name: Copy Fuse.js from node_modules
        run: |
          cp node_modules/fuse.js/dist/fuse.min.js explorer/js/fuse.min.js

      - name: Update Fuse.js reference for offline use
        run: |
          find explorer -name '*.html' -exec sed -i 's|https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js|js/fuse.min.js|g' {} +

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: explorer

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
