name: Deploy File Explorer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Update Firmware Data on New Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure files.json exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f explorer/data/files.json ]; then
            echo "Using committed files.json"
            FILE_COUNT=$(node -e "const d=require('./explorer/data/files.json'); console.log(d.totalFiles)")
            echo "files.json contains $FILE_COUNT files"
          else
            echo "files.json not found — generating from latest release"
            mkdir -p explorer/data
            RELEASE_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
            if [ -n "$RELEASE_TAG" ]; then
              gh release download "$RELEASE_TAG" --pattern "firmware_ok.md" --dir explorer/data/ || true
            fi
            node scripts/build-data.js --test
          fi

      - name: Copy Fuse.js from node_modules
        run: |
          cp node_modules/fuse.js/dist/fuse.min.js explorer/js/fuse.min.js

      - name: Update Fuse.js reference for offline use
        run: |
          find explorer -name '*.html' -exec sed -i 's|https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js|js/fuse.min.js|g' {} +

      - name: Fix favicon for deployment
        run: |
          cp assets/images/logo/primal_favicon.png explorer/favicon.png
          find explorer -name '*.html' -exec sed -i 's|../assets/images/logo/favicon.png|favicon.png|g' {} +

      - name: Fix logo for deployment
        run: |
          cp assets/images/logo/getwayrom_logo.png explorer/getwayrom_logo.png
          find explorer -name '*.html' -exec sed -i 's|../assets/images/logo/getwayrom_logo.png|getwayrom_logo.png|g' {} +

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: explorer

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
