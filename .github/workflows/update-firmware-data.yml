name: Update Firmware Data on New Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download firmware_ok.md from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p explorer/data

          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            RELEASE_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          fi

          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::No release found"
            exit 1
          fi

          echo "Downloading firmware_ok.md from release: $RELEASE_TAG"
          gh release download "$RELEASE_TAG" --pattern "firmware_ok.md" --dir explorer/data/

          if [ ! -f explorer/data/firmware_ok.md ]; then
            echo "::error::firmware_ok.md not found in release $RELEASE_TAG"
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Generate files.json
        run: node scripts/build-data.js --test

      - name: Verify generated data
        run: |
          if [ ! -f explorer/data/files.json ]; then
            echo "::error::files.json was not generated"
            exit 1
          fi

          FILE_COUNT=$(node -e "const d=require('./explorer/data/files.json'); console.log(d.totalFiles)")
          echo "Generated files.json with $FILE_COUNT files"

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::warning::files.json contains 0 files — check firmware_ok.md format"
          fi

      - name: Commit and push files.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add explorer/data/files.json

          if git diff --cached --quiet; then
            echo "No changes to files.json — skipping commit"
          else
            git commit -m "chore: update files.json from release ${{ env.RELEASE_TAG }}"
            git push origin main
            echo "Committed and pushed updated files.json"
          fi
