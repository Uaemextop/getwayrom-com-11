<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmware Downloads | Getwayrom</title>
    <link rel="icon" href="../assets/images/logo/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/explorer.css">
</head>
<body>
    <!-- Header / Toolbar -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo">
                <i class="fas fa-folder" style="color:var(--c-brand);font-size:20px"></i>
                <span class="logo-text">RealFirmware</span>
            </a>
            <button class="btn-icon sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        <div class="header-right">
            <button class="btn-icon" id="themeToggle" title="Toggle theme">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-topbar">
                <div class="sidebar-topbar-content">
                    <span class="sidebar-eyebrow">Workspace</span>
                    <h2 class="sidebar-title">Library</h2>
                </div>
            </div>
            <nav class="sidebar-nav">
                <!-- Sidebar Search -->
                <div class="sidebar-search-container">
                    <i class="fas fa-search sidebar-search-icon"></i>
                    <input type="text" id="sidebarSearch" class="sidebar-search-input" placeholder="Filter..." autocomplete="off">
                </div>

                <div class="sidebar-section">
                    <button class="sidebar-item active" data-filter="all">
                        <i class="fas fa-layer-group"></i>
                        <span>All Files</span>
                        <span class="badge" id="totalCount">0</span>
                    </button>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-heading" data-toggle-section>
                        <span><i class="fas fa-mobile-alt"></i> Brands</span>
                        <i class="fas fa-chevron-down sidebar-heading-icon"></i>
                    </div>
                    <div id="brandList" class="sidebar-scroll"></div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-heading" data-toggle-section>
                        <span><i class="fas fa-file-archive"></i> File Types</span>
                        <i class="fas fa-chevron-down sidebar-heading-icon"></i>
                    </div>
                    <div id="extensionList" class="sidebar-scroll"></div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-heading" data-toggle-section>
                        <span><i class="fas fa-cloud"></i> Sources</span>
                        <i class="fas fa-chevron-down sidebar-heading-icon"></i>
                    </div>
                    <div id="sourceList" class="sidebar-scroll"></div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-heading" data-toggle-section>
                        <span><i class="fas fa-tags"></i> Categories</span>
                        <i class="fas fa-chevron-down sidebar-heading-icon"></i>
                    </div>
                    <div id="categoryList" class="sidebar-scroll"></div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="storage-info">
                    <i class="fas fa-database"></i>
                    <span id="fileStats">Loading...</span>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content" id="content">
            <!-- Breadcrumb Bar -->
            <div class="breadcrumb-bar">
                <div class="breadcrumb">
                    <span class="breadcrumb-item breadcrumb-link" data-path=""><i class="fas fa-home"></i> Root</span>
                </div>
            </div>

            <!-- Search Toolbar -->
            <div class="search-toolbar" id="searchToolbar">
                <div class="search-container" id="searchContainer">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search files... (name, device, /)" autocomplete="off">
                    <button class="btn-icon search-clear hidden" id="searchClear" title="Clear search">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <span class="result-count" id="resultCount"></span>
                <button class="btn btn-secondary btn-toolbar-action" id="searchFilterBtn" title="Advanced search">
                    Filters
                </button>
                <!-- Advanced Search Panel -->
                <div class="advanced-search hidden" id="advancedSearch">
                    <div class="advanced-search-header">
                        <h3><i class="fas fa-filter"></i> Advanced Search</h3>
                        <button class="btn-icon" id="closeAdvancedSearch"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="advanced-search-body">
                        <div class="filter-group">
                            <label>File Extension</label>
                            <select id="filterExtension" class="filter-select">
                                <option value="">All extensions</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Brand</label>
                            <select id="filterBrand" class="filter-select">
                                <option value="">All brands</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>File Name Contains</label>
                            <input type="text" id="filterName" class="filter-input" placeholder="e.g. Android-12">
                        </div>
                        <div class="filter-actions">
                            <button class="btn btn-secondary" id="clearFilters">Clear</button>
                            <button class="btn btn-primary" id="applyFilters">Apply</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content Shell -->
            <section class="content-shell">
                <!-- Directory Summary -->
                <div class="dir-summary" id="dirSummary">
                    <div class="dir-summary-header" id="dirSummaryToggle">
                        <span class="dir-summary-title"><i class="fas fa-chart-pie"></i> Directory summary</span>
                        <i class="fas fa-chevron-right dir-summary-chevron"></i>
                    </div>
                    <div class="dir-summary-body" id="dirSummaryBody">
                        <!-- Populated dynamically -->
                    </div>
                </div>

                <!-- Active Filters -->
                <div class="active-filters" id="activeFilters"></div>

                <!-- Loading Spinner -->
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Loading firmware files...</p>
                </div>

                <!-- Empty State -->
                <div class="empty-state hidden" id="emptyState">
                    <div class="empty-state-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <h3>No files found</h3>
                    <p>Try adjusting your search or filters</p>
                    <button class="btn btn-primary" id="clearAllFiltersBtn">
                        <i class="fas fa-undo"></i> Clear All Filters
                    </button>
                </div>

                <!-- File Grid (hidden by default) -->
                <div class="file-grid hidden" id="fileGrid"></div>

                <!-- File List (visible by default) -->
                <div class="file-list" id="fileList">
                    <div class="file-list-header">
                        <div class="list-col list-col-icon"></div>
                        <div class="list-col list-col-name" data-sort="name-asc">
                            Name <i class="fas fa-sort"></i>
                        </div>
                        <div class="list-col list-col-action">
                            Actions
                        </div>
                    </div>
                    <div id="fileListBody"></div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <button class="btn btn-secondary btn-page" id="prevPage" disabled>
                        <i class="fas fa-chevron-left"></i> <span class="btn-page-text">Previous</span>
                    </button>
                    <div class="page-numbers" id="pageNumbers"></div>
                    <span class="page-info" id="pageInfo">Page 1</span>
                    <button class="btn btn-secondary btn-page" id="nextPage">
                        <span class="btn-page-text">Next</span> <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top hidden" id="backToTop" title="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Footer Navigation -->
    <footer class="footer-nav">
        <div class="footer-nav-inner">
            <a href="index.html" class="footer-link active"><i class="fas fa-folder"></i> <span>Firmware</span></a>
            <a href="about.html" class="footer-link"><i class="fas fa-info-circle"></i> <span>About</span></a>
            <a href="help.html" class="footer-link"><i class="fas fa-keyboard"></i> <span>Help</span></a>
        </div>
    </footer>

    <!-- Fuse.js for fuzzy search -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <!-- Day.js for date formatting -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/plugin/relativeTime.js"></script>
    <script>if(typeof dayjs!=='undefined'&&typeof dayjs_plugin_relativeTime!=='undefined')dayjs.extend(dayjs_plugin_relativeTime)</script>
    <!-- SortableJS for drag-and-drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <!-- Module scripts (loaded in dependency order) -->
    <script src="js/namespace.js"></script>
    <script src="js/event-bus.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/router.js"></script>
    <script src="js/virtual-list.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/search-engine.js"></script>
    <script src="js/file-renderer.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/keyboard.js"></script>
    <!-- Main application controller -->
    <script src="js/app.js"></script>
</body>
</html>
